name: smart_medicine_reminder
description: A Smart Medicine Reminder System with AI & Doctor Interaction
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  # State Management
  provider: ^6.1.1

  # UI & Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.9

  # Utilities
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  fl_chart: ^0.66.0
  uuid: ^4.3.3

  # Files & Media
  image_picker: ^1.0.7
  path_provider: ^2.1.2

  # PDF
  pdf: ^3.10.8
  printing: ^5.11.1

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  google_generative_ai: ^0.4.7
  url_launcher: ^6.3.2
  speech_to_text: ^7.3.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
